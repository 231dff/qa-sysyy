# ============================================================
# 智能搜索助手 — Docker Compose 编排
# 后端 (FastAPI) + 前端 (Next.js) + Prometheus + Grafana
# 通过内部网络通信，支持 95% SLA 可用性监控
# ============================================================

name: search-agent

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: search-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - search-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: search-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_BACKEND_URL=http://backend:8000
    networks:
      - search-network
    depends_on:
      backend:
        condition: service_healthy

  # ============================================================
  # Prometheus — 指标抓取与存储
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: search-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - search-network
    depends_on:
      backend:
        condition: service_healthy

  # ============================================================
  # Grafana — 可视化面板 (登录: admin / admin)
  # ============================================================
  grafana:
    image: grafana/grafana:11.2.0
    container_name: search-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - search-network
    depends_on:
      - prometheus

networks:
  search-network:
    driver: bridge

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
