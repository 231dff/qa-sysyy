# ============================================================
# 智能搜索助手 — Docker Compose 编排
# 后端 (FastAPI) + 前端 (Next.js)，通过内部网络通信
# ============================================================

name: search-agent

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: search-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - search-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: search-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_API_BASE=
    networks:
      - search-network
    depends_on:
      backend:
        condition: service_healthy

networks:
  search-network:
    driver: bridge
