# ============================================================
# Grafana 数据源自动配置
# Prometheus 作为默认数据源
# ============================================================
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: search-agent-prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      queryTimeout: 30s
      httpMethod: POST
    version: 1
